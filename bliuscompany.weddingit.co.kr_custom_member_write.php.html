	<script type="text/javascript">
		function chkForm() {
			var form = document.myForm;

			if (form.wm_mname.value == "" && form.wm_wname.value == "") {
				alert("신랑/신부 중 한명의 고객명은 입력하셔야 됩니다!");
				form.wm_mname.focus();
				return;
			}

			if (!InputCheck("myForm", "wm_order_date", "발주일", "S", "", "", "", "Y")) { return; }

			if (form.wm_mcode.length > 1) {
				for (var inx = 0; inx < form.wm_mcode.length; inx++) {
					if (form.wm_mcode[0].checked) {
						if (!form.chk_company_name.value) {
							alert('업체를 찾아주세요');
							form.chk_company_name.focus();
							return;
						}
					}
				}
			}

			var cnt = false;
			var obj = form['chk_gcode[]'];
			for (var i = 0; i < obj.length; i++) {
				if (obj[i].checked) {
					cnt = true;
				}
			}
			if (!cnt) {
				alert("촬영상품 구분 체크하세요!");
				return false;
			}
			form.submit();
		}

		// 업체고객 상품선택
		function setGoods(idx) {
			jQuery.ajax({
				type: 'POST',
				asyn: true,
				url: 'member_xml.php',
				data: 'wc_idx=' + idx,
				dataType: 'html',
				success: function (html) {
					jQuery('#goods').html(html);
				}
			});
		}

		function popClose() {
			if (confirm('고객 등록을 취소 하시겠습니까?')) {
				self.close();
			}
		}

		function setPlanner(ev) {
			var wc_idx = document.myForm.wc_idx.value;
			if (!wc_idx) {
				alert('업체를 찾아주세요');
				return false;
			}
			parent.SLB_show('/common/wed_planner.php?act=reg&wc_idx=' + wc_idx, 'iframe', 500, 400, true, true);
		}

		function setMcode(st) {
			if (st == "132") {
				jQuery('#trCom').css('display', 'none');
			} else {
				jQuery('#trCom').css('display', '');
			}
		}

		jQuery(document).ready(function () {
			// 업체 구분에 따른 입력모드 변경
			jQuery("input:radio[name='wm_mcode']").click(function () {
				setMcode(this.value);
			});
			setMcode('131');
		});
	</script>

	<script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
	<script>
		// 우편번호 찾기 화면을 넣을 element
		var eleZipLayer = document.getElementById('zipLayer');

		function closeDaumPostcode() {
			// iframe을 넣은 element를 안보이게 한다.
			eleZipLayer.style.display = 'none';
		}

		function execPostCode() {
			new daum.Postcode({
				oncomplete: function (data) {
					// 검색결과 항목을 클릭했을때 실행할 코드를 작성하는 부분.

					// 각 주소의 노출 규칙에 따라 주소를 조합한다.
					// 내려오는 변수가 값이 없는 경우엔 공백('')값을 가지므로, 이를 참고하여 분기 한다.
					var fullAddr = data.address; // 최종 주소 변수
					var extraAddr = ''; // 조합형 주소 변수

					// 기본 주소가 도로명 타입일때 조합한다.
					if (data.addressType === 'R') {
						//법정동명이 있을 경우 추가한다.
						if (data.bname !== '') {
							extraAddr += data.bname;
						}
						// 건물명이 있을 경우 추가한다.
						if (data.buildingName !== '') {
							extraAddr += (extraAddr !== '' ? ', ' + data.buildingName : data.buildingName);
						}
						// 조합형주소의 유무에 따라 양쪽에 괄호를 추가하여 최종 주소를 만든다.
						fullAddr += (extraAddr !== '' ? ' (' + extraAddr + ')' : '');
					}

					// 우편번호와 주소 정보를 해당 필드에 넣는다.
					document.myForm.chk_zip.value = data.zonecode;
					document.myForm.chk_addr1.value = fullAddr;
					document.myForm.chk_addr2.focus();

					// iframe을 넣은 element를 안보이게 한다.
					// (autoClose:false 기능을 이용한다면, 아래 코드를 제거해야 화면에서 사라지지 않는다.)
					eleZipLayer.style.display = 'none';
					eleZipLayer.style.zIndex = 0;
				},
				width: '100%',
				height: '100%'
			}).embed(eleZipLayer);

			// iframe을 넣은 element를 보이게 한다.
			eleZipLayer.style.display = 'block';

			// iframe을 넣은 element의 위치를 화면의 가운데로 이동시킨다.
			initLayerPosition();
		}
		function execPostCode2() {
			new daum.Postcode({
				oncomplete: function (data) {
					// 검색결과 항목을 클릭했을때 실행할 코드를 작성하는 부분.

					// 각 주소의 노출 규칙에 따라 주소를 조합한다.
					// 내려오는 변수가 값이 없는 경우엔 공백('')값을 가지므로, 이를 참고하여 분기 한다.
					var fullAddr = data.address; // 최종 주소 변수
					var extraAddr = ''; // 조합형 주소 변수

					// 기본 주소가 도로명 타입일때 조합한다.
					if (data.addressType === 'R') {
						//법정동명이 있을 경우 추가한다.
						if (data.bname !== '') {
							extraAddr += data.bname;
						}
						// 건물명이 있을 경우 추가한다.
						if (data.buildingName !== '') {
							extraAddr += (extraAddr !== '' ? ', ' + data.buildingName : data.buildingName);
						}
						// 조합형주소의 유무에 따라 양쪽에 괄호를 추가하여 최종 주소를 만든다.
						fullAddr += (extraAddr !== '' ? ' (' + extraAddr + ')' : '');
					}

					// 우편번호와 주소 정보를 해당 필드에 넣는다.
					document.myForm.chk2_zip.value = data.zonecode;
					document.myForm.chk2_addr1.value = fullAddr;
					document.myForm.chk2_addr2.focus();

					// iframe을 넣은 element를 안보이게 한다.
					// (autoClose:false 기능을 이용한다면, 아래 코드를 제거해야 화면에서 사라지지 않는다.)
					eleZipLayer.style.display = 'none';
					eleZipLayer.style.zIndex = 0;
				},
				width: '100%',
				height: '100%'
			}).embed(eleZipLayer);

			// iframe을 넣은 element를 보이게 한다.
			eleZipLayer.style.display = 'block';

			// iframe을 넣은 element의 위치를 화면의 가운데로 이동시킨다.
			initLayerPosition();
		}
		// 브라우저의 크기 변경에 따라 레이어를 가운데로 이동시키고자 하실때에는
		// resize이벤트나, orientationchange이벤트를 이용하여 값이 변경될때마다 아래 함수를 실행 시켜 주시거나,
		// 직접 eleZipLayer의 top,left값을 수정해 주시면 됩니다.
		function initLayerPosition() {
			var width = 550;			//우편번호서비스가 들어갈 element의 width
			var height = 300;			//우편번호서비스가 들어갈 element의 height
			var borderWidth = 5;	//샘플에서 사용하는 border의 두께
			eleZipLayer.style.zIndex = 10;

			// 위에서 선언한 값들을 실제 element에 넣는다.
			eleZipLayer.style.width = width + 'px';
			eleZipLayer.style.height = height + 'px';
			eleZipLayer.style.border = borderWidth + 'px solid';
			// 실행되는 순간의 화면 너비와 높이 값을 가져와서 중앙에 뜰 수 있도록 위치를 계산한다.
			eleZipLayer.style.left = (((window.innerWidth || document.documentElement.clientWidth) - width) / 2 - borderWidth) + 'px';
			eleZipLayer.style.top = (((window.innerHeight || document.documentElement.clientHeight) - height) / 2 - borderWidth) + 'px';
		}
	</script>
</body>
</html>
